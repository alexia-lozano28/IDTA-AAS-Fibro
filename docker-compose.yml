name: fibro-aas
services:
  dpp-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fibro-dpp-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DPP_FRONTEND_PORT:-3000}:3000"

  mongodb:
    image: mongo:8
    container_name: fibro-aas-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  aas-environment:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-10
    container_name: fibro-aas-environment
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ${AAS_ENVIRONMENT_MONGODB_DATABASE:-basyx-aas-environment}
      MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      MONGODB_AUTHENTICATION_DATABASE: admin
      # BaSyx appends /shells/{encoded-id}; descriptors therefore advertise
      # the intentionally public, read-only /api/shells route.
      BASYX_EXTERNAL_URL: ${PUBLIC_AAS_BASE_URL:-https://localhost:8443}/api
    volumes:
      - ./config/aas-environment/application.properties:/application/application.properties:ro

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-10
    container_name: fibro-aas-registry
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${AAS_REGISTRY_MONGODB_DATABASE:-basyx-aas-registry}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
      BASYX_CORS_ALLOWED_HEADERS: "*"
  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-milestone-10
    container_name: fibro-submodel-registry
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${SUBMODEL_REGISTRY_MONGODB_DATABASE:-basyx-submodel-registry}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
      BASYX_CORS_ALLOWED_HEADERS: "*"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: fibro-aas-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-keycloak-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-change-me-before-deployment}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/auth
    volumes:
      - ./security/keycloak/realm-basyx.json:/opt/keycloak/data/import/realm-basyx.json:ro

  security-gateway:
    build:
      context: .
      dockerfile: security/Dockerfile
    container_name: fibro-aas-security-gateway
    restart: unless-stopped
    depends_on:
      aas-environment:
        condition: service_started
      aas-registry:
        condition: service_started
      submodel-registry:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}
      OIDC_ISSUER: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/auth/realms/basyx
      OIDC_JWKS_URL: http://keycloak:8080/auth/realms/basyx/protocol/openid-connect/certs
      OIDC_AUDIENCE: basyx-api
    ports:
      - "127.0.0.1:${SECURITY_GATEWAY_PORT:-8443}:8443"
    volumes:
      - ./security/certs:/certs
      - web-ui-config:/ui-config
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-check-certificate",
          "-q",
          "-O",
          "-",
          "https://127.0.0.1:8443/gateway/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web-ui:
    image: eclipsebasyx/aas-gui:v2-260707
    container_name: fibro-aas-web-ui
    restart: unless-stopped
    depends_on:
      security-gateway:
        condition: service_healthy
    environment:
      AAS_WEB_UI_FEATURES_EDITING: "true"
      AAS_WEB_UI_FEATURES_UPLOADING: "true"
      ALLOW_EDITING: "true"
      ALLOW_UPLOADING: "true"
      ENDPOINT_CONFIG_AVAILABLE: "false"
      OIDC_URL: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/auth/realms/basyx
      OIDC_SCOPE: openid profile email
      OIDC_CLIENT_ID: basyx-web-ui
      AAS_DISCOVERY_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/registry/aas/lookup/shells
      AAS_REGISTRY_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/registry/aas/shell-descriptors
      SUBMODEL_REGISTRY_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/registry/submodels/submodel-descriptors
      AAS_REPO_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/shells
      SUBMODEL_REPO_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/submodels
      CD_REPO_PATH: ${PUBLIC_GATEWAY_URL:-https://localhost:8443}/concept-descriptions
    volumes:
      - web-ui-config:/usr/src/app/dist/config

  web-ui-login:
    image: nginx:1.27-alpine
    container_name: fibro-aas-web-ui-login
    restart: unless-stopped
    depends_on:
      web-ui:
        condition: service_started
    ports:
      - "127.0.0.1:${BASYX_WEB_UI_PORT:-3001}:80"
    volumes:
      - ./security/web-ui-login/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./security/web-ui-login/auto-login.js:/usr/share/nginx/html/auto-login.js:ro

volumes:
  mongodb-data:
  web-ui-config:
