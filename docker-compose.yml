name: teama-aas
services:
  mongodb:
    image: mongo:8
    container_name: fibro-aas-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  aas-environment:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-10
    container_name: fibro-aas-environment
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ${AAS_ENVIRONMENT_MONGODB_DATABASE:-basyx-aas-environment}
      MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      MONGODB_AUTHENTICATION_DATABASE: admin
    ports:
      - "${AAS_ENVIRONMENT_PORT:-8081}:8081"
    volumes:
      - ./config/aas-environment/application.properties:/application/application.properties:ro

  aas-registry:
    image: eclipsebasyx/aas-registry-log-mongodb:2.0.0-milestone-10
    container_name: fibro-aas-registry
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${AAS_REGISTRY_MONGODB_DATABASE:-basyx-aas-registry}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
      BASYX_CORS_ALLOWED_HEADERS: "*"
    ports:
      - "${AAS_REGISTRY_PORT:-8082}:8080"

  submodel-registry:
    image: eclipsebasyx/submodel-registry-log-mongodb:2.0.0-milestone-10
    container_name: fibro-submodel-registry
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: ${SUBMODEL_REGISTRY_MONGODB_DATABASE:-basyx-submodel-registry}
      SPRING_DATA_MONGODB_USERNAME: ${MONGODB_ROOT_USERNAME:-basyx}
      SPRING_DATA_MONGODB_PASSWORD: ${MONGODB_ROOT_PASSWORD:-change-me}
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      BASYX_CORS_ALLOWED_ORIGINS: "*"
      BASYX_CORS_ALLOWED_METHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
      BASYX_CORS_ALLOWED_HEADERS: "*"
    ports:
      - "${SUBMODEL_REGISTRY_PORT:-8083}:8080"

  web-ui:
    image: eclipsebasyx/aas-gui:v2-260707
    container_name: fibro-aas-web-ui
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      AAS_WEB_UI_FEATURES_EDITING: "true"
      AAS_WEB_UI_FEATURES_UPLOADING: "true"
    ports:
      - "${WEB_UI_PORT:-3000}:3000"
   
    volumes:
      - ./basyx-infra.yml:/usr/src/app/dist/config/basyx-infra.yml

volumes:
  mongodb-data:
