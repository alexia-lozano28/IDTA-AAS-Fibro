server.port=8081

# MongoDB persistence. BaSyx milestone-10 uses the Spring Boot 3 namespace.
basyx.backend=MongoDB
spring.data.mongodb.host=${MONGODB_HOST:mongodb}
spring.data.mongodb.port=${MONGODB_PORT:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:basyx-aas-environment}
spring.data.mongodb.username=${MONGODB_USERNAME:basyx}
spring.data.mongodb.password=${MONGODB_PASSWORD:change-me}
spring.data.mongodb.authentication-database=${MONGODB_AUTHENTICATION_DATABASE:admin}

# External URL used by registries and generated descriptors.
basyx.externalurl=http://172.17.242.161:8081

# Automatic registry integration.
basyx.aasrepository.feature.registryintegration=http://aas-registry:8080
basyx.submodelrepository.feature.registryintegration=http://submodel-registry:8080

# Local development CORS.
basyx.cors.allowed-origins=*
basyx.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD
basyx.cors.allowed-headers=*
basyx.security.enabled=true

basyx.feature.authorization.enabled=true
basyx.feature.authorization.type=rbac
basyx.feature.authorization.jwtBearerTokenProvider=keycloak
basyx.feature.authorization.rbac.file=classpath:rbac_rules.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/aas-fibro